<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>TechStore</title>

    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>

        body{
            background-color: #e9e9e9;
            font-family: Arial, sans-serif;
        }

        .navbar-custom{
            background-color: #1d1f27;
            padding: 15px 0;
        }

        .navbar-brand{
            color: white;
            font-size: 32px;
            font-weight: bold;
        }

        .navbar-nav .nav-link{
            color: white;
            margin-left: 15px;
            font-size: 18px;
        }

        .navbar-nav .nav-link:hover{
            color: lightgray;
        }

        /* Product Cards */
        .product-section{
            padding: 50px 0;
        }

        .card{
            border-radius: 10px;
            transition: 0.3s;
        }

        .card:hover{
            transform: scale(1.03);
        }

        .card img{
            height: 220px;
            object-fit: contain;
            padding: 15px;
        }

        .price{
            font-size: 24px;
            font-weight: bold;
        }

        /* Footer */
        .footer{
            background-color: #1d1f27;
            color: white;
            text-align: center;
            padding: 18px;
            margin-top: 40px;
            font-size: 18px;
        }

    </style>
</head>

<body>

    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-custom">

        <div class="container">

            <a class="navbar-brand" href="#">TechStore</a>

            <button class="navbar-toggler bg-light" type="button"
                data-bs-toggle="collapse"
                data-bs-target="#navbarNav">

                <span class="navbar-toggler-icon"></span>

            </button>

            <div class="collapse navbar-collapse justify-content-end" id="navbarNav">

                <ul class="navbar-nav">

                    <li class="nav-item">
                        <a class="nav-link" href="#">Home</a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link" href="#">Products</a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link" href="#">About</a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link" href="#">Contact</a>
                    </li>

                </ul>

            </div>

        </div>

    </nav>

    <!-- Product Section -->
    <div class="container product-section">

        <div class="row g-4">

            <!-- Laptop Card -->
            <div class="col-md-4">

                <div class="card h-100">

                    <img src="https://hips.hearstapps.com/hmg-prod/images/apple-m4-macbook-pro-lead-672b861685fd0.jpg"
                        class="card-img-top"
                        alt="Laptop">

                    <div class="card-body">

                        <h3 class="card-title">Laptop</h3>

                        <p class="card-text">High performance laptop</p>

                        <p class="price">
                            ₹50,000
                            <span class="badge bg-success">New</span>
                        </p>

                        <button class="btn btn-primary">
                            View Details
                        </button>

                    </div>

                </div>

            </div>

            <!-- Mobile Card -->
            <div class="col-md-4">

                <div class="card h-100">

                    <img src="https://www.mobileana.com/wp-content/uploads/2025/06/Apple-iPhone-17-Pro-Max-Cosmic-Orange.webp"
                        class="card-img-top"
                        alt="Mobile">

                    <div class="card-body">

                        <h3 class="card-title">Mobile</h3>

                        <p class="card-text">Latest smartphone</p>

                        <p class="price">
                            ₹30,000
                            <span class="badge bg-danger">Sale</span>
                        </p>

                        <button class="btn btn-primary">
                            View Details
                        </button>

                    </div>

                </div>

            </div>

            <!-- Headphones Card -->
            <div class="col-md-4">

                <div class="card h-100">

                    <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcTtjSkbZopOynGbCXLJ5T-OITb0IUt6J844KA&s"
                        class="card-img-top"
                        alt="Headphones">

                    <div class="card-body">

                        <h3 class="card-title">Headphones</h3>

                        <p class="card-text">Noise cancelling</p>

                        <p class="price">
                            ₹5,000
                            <span class="badge bg-success">New</span>
                        </p>

                        <button class="btn btn-primary">
                            View Details
                        </button>

                    </div>

                </div>

            </div>

        </div>

    </div>

    <!-- Footer -->
    <div class="footer">

        © 2026 TechStore | Follow us on social media

    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
