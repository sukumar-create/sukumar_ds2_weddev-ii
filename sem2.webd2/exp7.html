<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Student Information</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4f4f9;
      margin: 40px;
      text-align: center;
    }
    h1 {
      margin-bottom: 20px;
      color: #333;
    }
    .container {
      display: flex;
      justify-content: center;
      gap: 20px;
      flex-wrap: wrap;
    }
    .student-card {
      background: white;
      border: 1px solid #ddd;
      border-radius: 8px;
      padding: 20px;
      width: 250px;
      box-shadow: 0 4px 6px rgba(0,0,0,0.1);
      text-align: left;
    }
    .student-card h2 {
      margin: 0;
      font-size: 20px;
      color: #0077cc;
    }
    .student-card p {
      margin: 8px 0;
      font-size: 16px;
      color: #555;
    }
  </style>
</head>
<body>

  <h1>Student Information</h1>
  <div class="container">
    <div class="student-card">
      <h2>Rahul Sharma</h2>
      <p>Course: Computer Science</p>
      <p>Marks: 85</p>
    </div>
    <div class="student-card">
      <h2>Anita Verma</h2>
      <p>Course: Information Technology</p>
      <p>Marks: 92</p>
    </div>
    <div class="student-card">
      <h2>Rohan Gupta</h2>
      <p>Course: Electronics</p>
      <p>Marks: 78</p>
    </div>
  </div>

</body>
</html>
