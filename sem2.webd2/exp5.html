<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Employee Salary Management System</title>

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family: Arial, sans-serif;
    }

    body{
      background:#eef2f3;
      height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
    }

    .container{
      width:900px;
      background:#f5f5f5;
      padding:50px;
      border-radius:18px;
      box-shadow:0 5px 15px rgba(0,0,0,0.3);
      text-align:center;
    }

    h1{
      margin-bottom:35px;
      font-size:48px;
      font-weight:bold;
      color:black;
    }

    .form-box{
      width:300px;
      margin:0 auto;
    }

    input{
      width:100%;
      padding:14px;
      margin-bottom:14px;
      border:1px solid #888;
      font-size:18px;
      border-radius:2px;
    }

    button{
      background:#28a745;
      color:white;
      border:none;
      padding:12px 18px;
      font-size:18px;
      border-radius:6px;
      cursor:pointer;
      margin:8px;
    }

    button:hover{
      background:#218838;
    }

    .button-group{
      margin-top:20px;
    }

    #output{
      margin-top:30px;
      text-align:left;
      padding:20px;
      background:white;
      border-radius:10px;
      font-size:18px;
      max-height:250px;
      overflow:auto;
    }

  </style>
</head>

<body>

  <div class="container">

    <h1>Employee Salary Management System</h1>

    <div class="form-box">

      <input type="text" id="name" placeholder="Employee Name">

      <input type="text" id="id" placeholder="Employee ID">

      <input type="number" id="salary" placeholder="Salary">

      <input type="text" id="department" placeholder="Department">

      <button onclick="addEmployee()">Add Employee</button>

    </div>

    <div class="button-group">

      <button onclick="displayEmployees()">Display All</button>

      <button onclick="highSalary()">Salary > 50000</button>

      <button onclick="totalSalary()">Total Salary</button>

      <button onclick="averageSalary()">Average Salary</button>

      <br>

      <button onclick="countDepartment()">Count by Department</button>

    </div>

    <div id="output"></div>

  </div>

  <script>

    let employees = [];

    function addEmployee(){

      let name = document.getElementById("name").value;
      let id = document.getElementById("id").value;
      let salary = parseFloat(document.getElementById("salary").value);
      let department = document.getElementById("department").value;

      if(name === "" || id === "" || isNaN(salary) || department === ""){
        alert("Please fill all fields");
        return;
      }

      let employee = {
        name,
        id,
        salary,
        department
      };

      employees.push(employee);

      alert("Employee Added Successfully");

      document.getElementById("name").value = "";
      document.getElementById("id").value = "";
      document.getElementById("salary").value = "";
      document.getElementById("department").value = "";
    }

    function displayEmployees(){

      let output = "<h2>All Employees</h2>";

      employees.forEach(emp => {
        output += `
          <p>
            <strong>Name:</strong> ${emp.name} |
            <strong>ID:</strong> ${emp.id} |
            <strong>Salary:</strong> ${emp.salary} |
            <strong>Department:</strong> ${emp.department}
          </p>
          <hr>
        `;
      });

      document.getElementById("output").innerHTML = output;
    }

    function highSalary(){

      let filtered = employees.filter(emp => emp.salary > 50000);

      let output = "<h2>Employees with Salary > 50000</h2>";

      filtered.forEach(emp => {
        output += `
          <p>
            ${emp.name} - ${emp.salary}
          </p>
        `;
      });

      document.getElementById("output").innerHTML = output;
    }

    function totalSalary(){

      let total = employees.reduce((sum, emp) => sum + emp.salary, 0);

      document.getElementById("output").innerHTML =
      `<h2>Total Salary: ${total}</h2>`;
    }

    function averageSalary(){

      if(employees.length === 0){
        document.getElementById("output").innerHTML =
        "<h2>No Employees Added</h2>";
        return;
      }

      let total = employees.reduce((sum, emp) => sum + emp.salary, 0);

      let average = total / employees.length;

      document.getElementById("output").innerHTML =
      `<h2>Average Salary: ${average.toFixed(2)}</h2>`;
    }

    function countDepartment(){

      let deptCount = {};

      employees.forEach(emp => {

        if(deptCount[emp.department]){
          deptCount[emp.department]++;
        }
        else{
          deptCount[emp.department] = 1;
        }

      });

      let output = "<h2>Department Count</h2>";

      for(let dept in deptCount){

        output += `
          <p>
            ${dept} : ${deptCount[dept]}
          </p>
        `;
      }

      document.getElementById("output").innerHTML = output;
    }

  </script>

</body>
</html>
